name: "CI"
on:
  pull_request:

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      candidate_image: ${{ steps.image_meta.outputs.candidate_image }}
      candidate_image_artifact: ${{ steps.image_meta.outputs.candidate_image_artifact }}
    steps:
      - uses: actions/checkout@v7

      - name: Set candidate image tag
        id: image_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "[build-image] Starting image metadata preparation"
          echo "[build-image] GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "[build-image] GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}"
          echo "[build-image] GITHUB_SHA=${GITHUB_SHA}"

          ARTIFACT_SUFFIX="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA:0:7}-${RANDOM}"
          echo "candidate_image=local/pretalx-devcontainer:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "candidate_image_artifact=candidate-image-${ARTIFACT_SUFFIX}" >> "${GITHUB_OUTPUT}"
          echo "[build-image] candidate_image=local/pretalx-devcontainer:${GITHUB_SHA}"
          echo "[build-image] candidate_image_artifact=candidate-image-${ARTIFACT_SUFFIX}"

      - name: Build image
        id: build_image
        shell: bash
        run: |
          set -euo pipefail
          echo "[build-image] Building image ${{ steps.image_meta.outputs.candidate_image }}"
          docker build --file container/Containerfile --tag "${{ steps.image_meta.outputs.candidate_image }}" container
          echo "[build-image] Build complete"

      - name: Export candidate image
        shell: bash
        run: |
          set -euo pipefail
          echo "[build-image] Exporting candidate image to tar archive"
          docker save "${{ steps.image_meta.outputs.candidate_image }}" --output candidate-image.tar
          ls -lh candidate-image.tar
          echo "[build-image] Export complete"

      - name: Upload candidate image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.image_meta.outputs.candidate_image_artifact }}
          path: candidate-image.tar
          retention-days: 1

  test-pretalx:
    needs: [build-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image_variant: [stable, candidate]
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image for '${{ matrix.image_variant }}'
        id: resolve_image
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Resolving image for variant='${{ matrix.image_variant }}'"

          if [[ "${{ matrix.image_variant }}" == "stable" ]]; then
            SELECTED_IMAGE="ghcr.io/tjarbo/pretalx-devcontainer/devcontainer:stable"
          else
            SELECTED_IMAGE="${{ needs.build-image.outputs.candidate_image }}"
          fi

          echo "selected_image=${SELECTED_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "[test-pretalx] Selected image: ${SELECTED_IMAGE}"

      - name: Pull stable image from registry
        if: matrix.image_variant == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Pulling stable image ${{ steps.resolve_image.outputs.selected_image }}"
          docker pull "${{ steps.resolve_image.outputs.selected_image }}"

      - name: Print available images after stable pull
        if: matrix.image_variant == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Docker images after stable pull:"
          docker image ls --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}'

      - name: Download candidate image artifact
        if: matrix.image_variant == 'candidate'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-image.outputs.candidate_image_artifact }}
          path: .

      - name: Load candidate image
        if: matrix.image_variant == 'candidate'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Loading candidate image from artifact"
          docker load --input candidate-image.tar
          echo "[test-pretalx] Candidate image load complete"

      - name: Print available images after candidate load
        if: matrix.image_variant == 'candidate'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Docker images after candidate load:"
          docker image ls --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}'

      - name: Prepare pretalx template for selected image
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx] Preparing template 'pretalx' for image '${{ steps.resolve_image.outputs.selected_image }}'"

          if [[ ! -e src ]]; then
            echo "[test-pretalx] Creating src -> templates symlink"
            ln -s templates src
          fi

          TEMPLATE_PATH="templates/pretalx/.devcontainer/devcontainer.json"
          if [[ ! -f "${TEMPLATE_PATH}" ]]; then
            echo "Template file not found: ${TEMPLATE_PATH}" >&2
            exit 1
          fi
          echo "[test-pretalx] Updating image reference in ${TEMPLATE_PATH}"

          # devcontainer.json can include comments (JSONC), so avoid jq parsing here.
          sed -E -i 's|^([[:space:]]*"image"[[:space:]]*:[[:space:]]*").*(",?[[:space:]]*)$|\1${{ steps.resolve_image.outputs.selected_image }}\2|' "${TEMPLATE_PATH}"

          if ! grep -Eq '^[[:space:]]*"image"[[:space:]]*:[[:space:]]*"${{ steps.resolve_image.outputs.selected_image }}"' "${TEMPLATE_PATH}"; then
            echo "Failed to set image in ${TEMPLATE_PATH}" >&2
            exit 1
          fi
          echo "[test-pretalx] Image reference successfully updated"

      - name: Smoke test for 'pretalx' using '${{ matrix.image_variant }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "pretalx"

  test-pretalx-plugin:
    needs: [build-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image_variant: [stable, candidate]
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image for '${{ matrix.image_variant }}'
        id: resolve_image
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Resolving image for variant='${{ matrix.image_variant }}'"

          if [[ "${{ matrix.image_variant }}" == "stable" ]]; then
            SELECTED_IMAGE="ghcr.io/tjarbo/pretalx-devcontainer/devcontainer:stable"
          else
            SELECTED_IMAGE="${{ needs.build-image.outputs.candidate_image }}"
          fi

          echo "selected_image=${SELECTED_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "[test-pretalx-plugin] Selected image: ${SELECTED_IMAGE}"

      - name: Pull stable image from registry
        if: matrix.image_variant == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Pulling stable image ${{ steps.resolve_image.outputs.selected_image }}"
          docker pull "${{ steps.resolve_image.outputs.selected_image }}"

      - name: Print available images after stable pull
        if: matrix.image_variant == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Docker images after stable pull:"
          docker image ls --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}'

      - name: Download candidate image artifact
        if: matrix.image_variant == 'candidate'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-image.outputs.candidate_image_artifact }}
          path: .

      - name: Load candidate image
        if: matrix.image_variant == 'candidate'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Loading candidate image from artifact"
          docker load --input candidate-image.tar
          echo "[test-pretalx-plugin] Candidate image load complete"

      - name: Print available images after candidate load
        if: matrix.image_variant == 'candidate'
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Docker images after candidate load:"
          docker image ls --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}'

      - name: Bootstrap plugin project via cookiecutter
        shell: bash
        run: |
          set -euo pipefail
          echo "[test-pretalx-plugin] Bootstrapping plugin project from cookiecutter"

          python3 -m pip install --disable-pip-version-check --quiet cookiecutter

          BOOTSTRAP_ROOT="$(mktemp -d)"
          python3 -m cookiecutter --no-input \
            --output-dir "${BOOTSTRAP_ROOT}" \
            https://github.com/tjarbo/pretalx-plugin-cookiecutter-devcontainer \
            human_name="pretalx DUMMY plugin" \
            module_name="pretalx_dummy" \
            short_description="pretalx plugin for testing purposes" \
            author_name="Pretalx Devcontainer Maintainers" \
            author_email="maintainer@pretalx.local" \
            repo_url="https://pretalx.local/devcontainers/pretalx-dummy" \
            category="FEATURE"

          GENERATED_DIR="$(find "${BOOTSTRAP_ROOT}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [[ -z "${GENERATED_DIR}" || ! -d "${GENERATED_DIR}" ]]; then
            echo "Failed to generate project from cookiecutter" >&2
            exit 1
          fi

          PREPARED_SRC_DIR="$(mktemp -d)/pretalx-plugin"
          mkdir -p "${PREPARED_SRC_DIR}"
          cp -R "${GENERATED_DIR}/." "${PREPARED_SRC_DIR}/"

          rm -rf "${PREPARED_SRC_DIR}/.devcontainer"
          cp -R "templates/pretalx-plugin/.devcontainer" "${PREPARED_SRC_DIR}/.devcontainer"
          cp "templates/pretalx-plugin/devcontainer-template.json" "${PREPARED_SRC_DIR}/devcontainer-template.json"

          rm -rf src
          mkdir -p src
          cp -R "${PREPARED_SRC_DIR}" "src/pretalx-plugin"

          echo "[test-pretalx-plugin] Cookiecutter bootstrap complete"

      - name: Prepare plugin template for selected image
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATE_PATH="src/pretalx-plugin/.devcontainer/devcontainer.json"
          if [[ ! -f "${TEMPLATE_PATH}" ]]; then
            echo "Template file not found: ${TEMPLATE_PATH}" >&2
            exit 1
          fi

          echo "[test-pretalx-plugin] Updating image reference in ${TEMPLATE_PATH}"

          # devcontainer.json can include comments (JSONC), so avoid jq parsing here.
          sed -E -i 's|^([[:space:]]*"image"[[:space:]]*:[[:space:]]*").*(",?[[:space:]]*)$|\1${{ steps.resolve_image.outputs.selected_image }}\2|' "${TEMPLATE_PATH}"

          if ! grep -Eq '^[[:space:]]*"image"[[:space:]]*:[[:space:]]*"${{ steps.resolve_image.outputs.selected_image }}"' "${TEMPLATE_PATH}"; then
            echo "Failed to set image in ${TEMPLATE_PATH}" >&2
            exit 1
          fi
          echo "[test-pretalx-plugin] Image reference successfully updated"

      - name: Smoke test for 'pretalx-plugin' using '${{ matrix.image_variant }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "pretalx-plugin"
