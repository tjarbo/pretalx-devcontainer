# This workflow ensure automated releases for any change related to the container image.
# The triggers are:
# - Weekly on Sundays at midnight (UTC) to ensure regular base image updates. These cause a new fix release.
# - On every push to the main branch to ensure that any change related to the container image is released.

name: CD - Container Image

on:
  push:
    branches:
      - 'main'
      - 'stable'
    tags:
      - 'container@*'  

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/devcontainer

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v6.0.2
        with:
          debug: true
          tag_prefix: "container@"
          change_path: "container"

      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1.10.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fromTag: ${{ github.ref_name }}
          toTag: v${{ steps.semver.outputs.previous_version }}"
          writeToFile: false

      - name: Comment changelog and new version number on commit
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/commit-comment@v4
        with:
          body: |
            This commit would cause the following version: ${{ steps.semver.outputs.version_tag }}
            Changelog:
            ${{ steps.changelog.outputs.changelog }}

      - name: Create GitHub release
        if: github.ref == 'refs/heads/stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.semver.outputs.changed }}" != "true" ]; then
            echo "No version change detected. Skipping release."
            exit 0
          fi

          TAG="${{ steps.semver.outputs.version_tag }}"
          if [ -z "$TAG" ]; then
            TAG="container@${{ steps.semver.outputs.version }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --target "${GITHUB_SHA}" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.changelog }}"
        
  build-and-push:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Inject project license
        run: make inject-license

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},match=container@(\d.\d.\d)$
            type=semver,pattern=v{{major}},match=container@(\d.\d.\d)$
            type=semver,pattern=v{{major}}.{{minor}},match=container@(\d.\d.\d)$

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: container/
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
