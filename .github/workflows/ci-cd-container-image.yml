# This workflow ensure automated releases for any change related to the container image.
# The triggers are:
# - On every push to the main and stable branches to ensure that any change related to the container image is released.
# - On pull requests targeting main and stable to validate the container image build without publishing.

name: CI/CD - Container Image

on:
  push:
    branches:
      - 'main'
      - 'stable'
  pull_request:
    branches:
      - 'main'
      - 'stable'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/devcontainer

jobs:
  release-build-and-push:
    name: Release, Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v6.0.2
        with:
          debug: true
          tag_prefix: "container@"
          change_path: "container"

      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1.10.3
        with:
          token: ${{ github.token }}
          fromTag: ${{ github.ref_name }}
          toTag: container@${{ steps.semver.outputs.previous_version }}
          writeToFile: false

      - name: Comment changelog and new version number on commit
        if: github.event_name == 'pull_request'
        uses: peter-evans/commit-comment@v4
        with:
          body: |
            This commit would cause the following version: ${{ steps.semver.outputs.version_tag }}
            Changelog:
            ${{ steps.changelog.outputs.changelog }}

      - name: Split semantic version for tag aliases
        id: version_parts
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
      
      - name: Inject project license
        run: make inject-license

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.semver.outputs.version }},enable=${{ github.ref == 'refs/heads/stable' && steps.semver.outputs.changed == 'true' }}
            type=raw,value=v${{ steps.version_parts.outputs.major }},enable=${{ github.ref == 'refs/heads/stable' && steps.semver.outputs.changed == 'true' }}
            type=raw,value=v${{ steps.version_parts.outputs.major }}.${{ steps.version_parts.outputs.minor }},enable=${{ github.ref == 'refs/heads/stable' && steps.semver.outputs.changed == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: container/
          file: container/Containerfile
          platforms: linux/amd64,linux/arm64
          load: true
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/stable' && steps.semver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.semver.outputs.version_tag }}"
          if [ -z "$TAG" ]; then
            TAG="container@${{ steps.semver.outputs.version }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --target "${GITHUB_SHA}" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.changelog }}"
