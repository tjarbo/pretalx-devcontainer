name: Draft Release

on:
  push:
    branches:
      - stable

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v6.0.2
        with:
          debug: true

      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1.10.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fromTag: ${{ github.ref_name }}
          toTag: v${{ steps.semver.outputs.previous_version }}
          writeToFile: false

      - name: Draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.changes }}
        run: |
          if [ "${{ steps.semver.outputs.changed }}" != "true" ]; then
            echo "No version change detected. Skipping release."
            exit 0
          fi

          TAG="${{ steps.semver.outputs.version_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${{ steps.semver.outputs.version }}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --target "${GITHUB_SHA}" \
            --title "$TAG" \
            --draft \
            --notes "$CHANGELOG"