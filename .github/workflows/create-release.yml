name: Create Release

on:
  push:
    branches:
      - stable

jobs:
  run-on-main-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # fetch all history
          filter: blob:none # exclude file contents for faster checkout
      - uses: paulhatch/semantic-version@v6.0.2
        with:
          debug: true
        